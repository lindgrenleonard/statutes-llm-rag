    <style>
      :root {
        --primary: #9b59b6;
        --primary-hover: #8e44ad;
        --primary-light: #e8d5f0;
        --bg: #f5f0f8;
        --bg-card: #ffffff;
        --bg-input: #ffffff;
        --border: #ddd0e6;
        --text: #2c1a33;
        --text-muted: #7a6485;
        --text-inverse: #ffffff;
        --shadow: 0 1px 3px rgba(100, 50, 120, 0.08);
        --shadow-lg: 0 4px 12px rgba(100, 50, 120, 0.12);
        --user-bubble: #9b59b6;
        --assistant-bubble: #f5f0f8;
        --assistant-bubble-text: #2c1a33;
      }

      [data-theme="dark"] {
        --primary: #b07cc6;
        --primary-hover: #9b59b6;
        --primary-light: #3d2a4a;
        --bg: #1a1025;
        --bg-card: #251835;
        --bg-input: #251835;
        --border: #3d2a50;
        --text: #e8ddf0;
        --text-muted: #9a87a8;
        --text-inverse: #ffffff;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.4);
        --user-bubble: #9b59b6;
        --assistant-bubble: #251835;
        --assistant-bubble-text: #e8ddf0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Open Sans", system-ui, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: var(--primary);
        color: var(--text-inverse);
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow-lg);
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .header-left .logo {
        width: 36px;
        height: 36px;
      }

      .header-left .logo polyline,
      .header-left .logo path {
        fill: var(--text-inverse);
      }

      .header-left .logo #Core {
        fill: transparent;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }

      header p {
        font-size: 0.8rem;
        opacity: 0.85;
      }

      .header-actions {
        display: flex;
        gap: 0.5rem;
      }

      .icon-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: var(--text-inverse);
        width: 36px;
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      #chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
      }

      .message {
        display: flex;
        flex-direction: column;
        max-width: 80%;
        animation: fadeIn 0.2s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
      }
      .message.assistant {
        align-self: flex-start;
      }

      .message-bubble {
        padding: 0.75rem 1rem;
        border-radius: 12px;
        line-height: 1.6;
        font-size: 0.925rem;
        word-wrap: break-word;
      }

      .message.user .message-bubble {
        background: var(--user-bubble);
        color: var(--text-inverse);
        border-bottom-right-radius: 4px;
      }

      .message.assistant .message-bubble {
        background: var(--assistant-bubble);
        color: var(--assistant-bubble-text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .message-bubble ul,
      .message-bubble ol {
        margin: 0.5rem 0;
        padding-left: 1.25rem;
      }

      .message-bubble li {
        margin: 0.25rem 0;
      }

      .message-bubble p {
        margin: 0.4rem 0;
      }
      .message-bubble p:first-child {
        margin-top: 0;
      }
      .message-bubble p:last-child {
        margin-bottom: 0;
      }

      .message-bubble strong {
        font-weight: 600;
      }

      .sources {
        margin-top: 0.5rem;
        padding: 0.5rem 0.75rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .sources-title {
        font-weight: 600;
        margin-bottom: 0.25rem;
        color: var(--text);
      }

      .source-item {
        display: flex;
        justify-content: space-between;
        padding: 0.15rem 0;
      }

      .source-score {
        font-family: monospace;
        font-size: 0.75rem;
      }

      .welcome {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
      }

      .welcome .welcome-logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1rem;
      }

      .welcome .welcome-logo polyline,
      .welcome .welcome-logo path {
        fill: var(--primary);
      }

      .welcome .welcome-logo #Core {
        fill: transparent;
      }

      .welcome h2 {
        font-size: 1.5rem;
        color: var(--text);
        margin-bottom: 0.5rem;
      }

      .welcome p {
        margin-bottom: 1.5rem;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      .suggestion {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        font-family: inherit;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        color: var(--text);
      }

      .suggestion:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow);
      }

      #input-area {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        background: var(--bg);
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
      }

      .input-wrapper {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      #message-input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 0.925rem;
        font-family: inherit;
        background: var(--bg-input);
        color: var(--text);
        resize: none;
        min-height: 44px;
        max-height: 120px;
        outline: none;
        transition: border-color 0.2s;
      }

      #message-input:focus {
        border-color: var(--primary);
      }

      #message-input::placeholder {
        color: var(--text-muted);
      }

      #send-btn {
        background: var(--primary);
        color: var(--text-inverse);
        border: none;
        width: 44px;
        height: 44px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
      }

      #send-btn:hover {
        background: var(--primary-hover);
      }
      #send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .typing-indicator {
        display: inline-flex;
        gap: 4px;
        padding: 0.5rem 0;
      }

      .typing-indicator span {
        width: 6px;
        height: 6px;
        background: var(--text-muted);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
        }
        40% {
          transform: scale(1);
        }
      }

      @media (max-width: 640px) {
        .message {
          max-width: 90%;
        }
        .suggestions {
          flex-direction: column;
        }
      }
    </style>

    <script>
      const chatContainer = document.getElementById("chat-container");
      const messageInput = document.getElementById("message-input");
      const sendBtn = document.getElementById("send-btn");
      let isStreaming = false;

      function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute("data-theme");
        html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
      }

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }

      function handleKeydown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function askSuggestion(btn) {
        messageInput.value = btn.textContent;
        sendMessage();
      }

      function addMessage(role, content) {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();

        const msg = document.createElement("div");
        msg.className = `message ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.innerHTML = content;

        msg.appendChild(bubble);
        chatContainer.appendChild(msg);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msg;
      }

      function formatMarkdown(text) {
        let html = text
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>");

        const lines = html.split("\n");
        let result = [];
        let inList = false;

        for (const line of lines) {
          const trimmed = line.trim();
          if (/^[-*]\s/.test(trimmed)) {
            if (!inList) {
              result.push("<ul>");
              inList = true;
            }
            result.push(`<li>${trimmed.replace(/^[-*]\s/, "")}</li>`);
          } else if (/^\d+\.\s/.test(trimmed)) {
            if (!inList) {
              result.push("<ol>");
              inList = true;
            }
            result.push(`<li>${trimmed.replace(/^\d+\.\s/, "")}</li>`);
          } else {
            if (inList) {
              result.push(
                result[result.length - 2]?.startsWith("<ol>")
                  ? "</ol>"
                  : "</ul>",
              );
              inList = false;
            }
            if (trimmed) result.push(`<p>${trimmed}</p>`);
          }
        }
        if (inList) result.push("</ul>");

        return result.join("");
      }

      function addSources(messageEl, sources) {
        if (!sources.length) return;

        const div = document.createElement("div");
        div.className = "sources";

        let html = '<div class="sources-title">Sources</div>';
        for (const s of sources) {
          const name = s.file.replace(/\.md$/, "").replace(/_/g, " ");
          const score =
            s.score !== null
              ? `<span class="source-score">${s.score}</span>`
              : "";
          html += `<div class="source-item"><span>${name}</span>${score}</div>`;
        }
        div.innerHTML = html;
        messageEl.appendChild(div);
      }

      async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;
        messageInput.value = "";
        messageInput.style.height = "auto";

        addMessage("user", text);

        const msgEl = addMessage(
          "assistant",
          '<div class="typing-indicator"><span></span><span></span><span></span></div>',
        );
        const bubble = msgEl.querySelector(".message-bubble");

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let fullText = "";
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const data = line.slice(6);
              if (data === "[DONE]") continue;

              const parsed = JSON.parse(data);
              if (parsed.type === "token") {
                fullText += parsed.content;
                bubble.innerHTML = formatMarkdown(fullText);
                chatContainer.scrollTop = chatContainer.scrollHeight;
              } else if (parsed.type === "sources") {
                addSources(msgEl, parsed.content);
              }
            }
          }
        } catch (err) {
          bubble.innerHTML = `<p>Error: ${err.message}. Please try again.</p>`;
        }

        isStreaming = false;
        sendBtn.disabled = false;
        messageInput.focus();
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

                        </g>
